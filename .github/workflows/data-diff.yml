name: data-diff

# On any PR that changes the feed, comment a summary of how the *data* changed
# (row-count, distribution shifts, new values, null rates) — a data-diff for reviewers.
on:
  pull_request:
    paths:
      - 'data/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  diff:
    name: Data-diff on the PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch base branch
        run: git fetch --no-tags --depth=1 origin ${{ github.base_ref }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Compute data-diff (PR vs base)
        run: |
          git show origin/${{ github.base_ref }}:data/orders.csv > baseline.csv 2>/dev/null || printf 'order_id\n' > baseline.csv
          python -m src.quality.data_diff baseline.csv data/orders.csv | tee diff.md
      - name: Comment the diff on the PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = '<!-- data-diff -->\n' + fs.readFileSync('diff.md', 'utf8');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('<!-- data-diff -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body,
              });
            }
